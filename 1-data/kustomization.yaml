apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

components:
  - ../components/revision-history-limit
  - ../components/strategy-recreate

resources:
  - postgres.yaml
  - redis.yaml
  - secrets.yaml

configMapGenerator:
  - name: postgres-init
    files:
      - postgres/init-databases.sh
