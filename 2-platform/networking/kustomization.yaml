apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - adguard.yaml
  - cloudflared.yaml
  - secrets.yaml
configMapGenerator:
  - name: coredns-custom
    namespace: kube-system
    options:
      disableNameSuffixHash: true
    files:
      - coredns/lan.conf
  - name: adguard
    files:
      - adguard/adguard-home.yaml
