# 노드별 하드웨어/OS 메트릭 수집 (Prometheus가 스크래핑)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: default
  labels:
    app: node-exporter
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      tolerations:
        - operator: Exists
      hostNetwork: true  # 호스트 네트워크 메트릭 수집에 필요
      hostPID: true  # 호스트 프로세스 메트릭 수집에 필요
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.11.1
          args:
            - "--path.rootfs=/host"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          ports:
            - containerPort: 9100
              name: metrics
              hostPort: 9100
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: default
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - port: 9100
      name: metrics
      targetPort: 9100
