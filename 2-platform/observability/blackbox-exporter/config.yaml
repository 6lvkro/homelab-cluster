# Blackbox Exporter probe 모듈 설정
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302, 401, 403]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: ip4
  tcp_connect:
    prober: tcp
    timeout: 5s
