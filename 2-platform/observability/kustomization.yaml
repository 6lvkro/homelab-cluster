# observability -- Prometheus, Grafana, Exporter 등 모니터링 스택
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - blackbox-exporter.yaml
  - grafana.yaml
  - kube-state-metrics.yaml
  - node-exporter.yaml
  - nvidia-gpu-exporter.yaml
  - prometheus.yaml
  - secrets.yaml

configMapGenerator:
  - name: blackbox-exporter
    files:
      - blackbox-exporter/config.yaml
  - name: prometheus
    files:
      - prometheus/prometheus.yaml
  - name: grafana
    literals:
      - GF_INSTALL_PLUGINS=speakyourcode-button-panel,cloudspout-button-panel
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana
      - GF_DATABASE_SSL_MODE=disable
      - GF_SERVER_ROOT_URL=https://${SUB_GRAFANA}.${DOMAIN_LAN}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Pocket ID
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${POCKET_ID_CLIENT_ID_GRAFANA}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://${SUB_POCKET_ID}.${DOMAIN_LAN}/authorize
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://pocket-id:1411/api/oidc/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://pocket-id:1411/api/oidc/userinfo
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=name
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH='GrafanaAdmin'
      - GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP=true
      - TZ=${TZ}
