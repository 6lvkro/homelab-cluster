# kustomize configMapGeneratorлҘј нҶөн•ҙ ConfigMapмңјлЎң мһҗлҸҷ ліҖнҷҳлҗңлӢӨ.
# git push нӣ„ Fluxк°Җ мһҗлҸҷ л°ҳмҳҒ

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # NODE_IOT, NODE_STORAGE, NODE_COMPUTE
  - job_name: node_exporter
    static_configs:
      - targets:
          [
            "${NODE_IOT_IP}:9100",
            "${NODE_STORAGE_IP}:9100",
            "${NODE_COMPUTE_IP}:9100",
          ]

  # NVIDIA GPU л©”нҠёлҰӯ (nvidia_gpu_exporter -- NVML кё°л°ҳ)
  - job_name: nvidia_gpu_exporter
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]

  - job_name: windows_exporter
    static_configs:
      - targets: ["${NODE_COMPUTE_IP}:9182"]

  # NODE_COMPUTEк°Җ WindowsлЎң л¶ҖнҢ…лҗҗмқ„ л•Ңмқҳ GPU exporter (hostм—җм„ң м§Ғм ‘)
  - job_name: nvidia_gpu_exporter_windows
    static_configs:
      - targets: ["${NODE_COMPUTE_IP}:9835"]

  # k3s kubelet лӮҙмһҘ cAdvisor
  - job_name: cadvisor
    scheme: https
    tls_config:
      insecure_skip_verify: true  # kubelet мһҗмІҙ м„ңлӘ… мқёмҰқм„ң н—Ҳмҡ©
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token  # ServiceAccount нҶ нҒ°мңјлЎң kubelet мқёмҰқ
    metrics_path: /metrics/cadvisor
    static_configs:
      - targets:
          ["${NODE_IOT_IP}:10250", "${NODE_STORAGE_IP}:10250", "${NODE_COMPUTE_IP}:10250"]

  - job_name: kube_state_metrics
    static_configs:
      - targets: ["kube-state-metrics:8080"]

  # л°ұм—… лӘЁлӢҲн„°л§Ғ (velero_backup_* л©”нҠёлҰӯ)
  - job_name: velero
    static_configs:
      - targets: ["velero.velero.svc:8085"]

  # в”Җв”Җв”Җв”Җ Blackbox Exporter (м„ңл№„мҠӨ к°Җмҡ©м„ұ HTTP probe) в”Җв”Җв”Җв”Җ
  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # в”Җв”Җв”Җв”Җ н”Ңлһ«нҸј в”Җв”Җв”Җв”Җ
          - http://adguard-web:3000
          - http://gitea:3000
          - http://grafana:3000
          - http://oauth2-proxy:4180
          - http://pocket-id:1411
          # в”Җв”Җв”Җв”Җ AI/ML в”Җв”Җв”Җв”Җ
          - http://open-webui:8080
          - http://ollama:11434
          # в”Җв”Җв”Җв”Җ IoT в”Җв”Җв”Җв”Җ
          - http://homeassistant:8123
          - http://zigbee2mqtt:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
          - redis:6379
          - mosquitto:1883
          - loki:3100
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
