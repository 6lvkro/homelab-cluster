            kubernetes.io/hostname: ${NODE_STORAGE}
          containers:
          - name: pg-restore-test
            image: postgres:16-alpine
            command: ["/bin/sh", "/scripts/postgres-restore-test.sh"]
            env:
            - name: DB_PASSWORD_POSTGRES
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DB_PASSWORD_POSTGRES
            - name: TZ
              value: "${TZ}"
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
            volumeMounts:
            - name: backup
              mountPath: /backup
              subPath: backups
            - name: scripts
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: shared-misc
          - name: scripts
