name: Renovate
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    container:
      image: renovate/renovate:latest
    steps:
      - name: Run Renovate
        run: renovate
        env:
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_COM_TOKEN }}
          RENOVATE_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
          RENOVATE_ENDPOINT: ${{ vars.RENOVATE_ENDPOINT }}
          RENOVATE_PLATFORM: gitea
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_USERNAME: ${{ github.repository_owner }}
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@${{ vars.DOMAIN_LAN }}>"
          RENOVATE_GIT_URL: endpoint
          LOG_LEVEL: info
