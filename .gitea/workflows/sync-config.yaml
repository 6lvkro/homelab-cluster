# .env.config -> cluster-config ConfigMap 동기화
name: Sync cluster-config

on:
  push:
    branches: [main]
    paths:
      - ".env.config"
  workflow_dispatch:

jobs:
  sync:
    runs-on: linux-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup kubectl
        run: |
          .gitea/scripts/ensure-kubectl.sh
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Sync and reconcile
        run: .gitea/scripts/sync-config.sh
