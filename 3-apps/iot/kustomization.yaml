# iot 리소스 -- 스마트홈 및 IoT 디바이스
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - homeassistant.yaml
  - mosquitto.yaml
  - zigbee2mqtt.yaml

configMapGenerator:
  - name: homeassistant
    files:
      - homeassistant/configuration.yaml
  - name: zigbee2mqtt
    files:
      - zigbee2mqtt/configuration.yaml
  - name: mosquitto
    files:
      - mosquitto/mosquitto.conf
