# 노드 재시작/리소스 압박 시 발생하는 Failed, Evicted 등 잔여 파드 자동 정리
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-cleanup
  namespace: default
  labels:
    app: pod-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-cleanup
  labels:
    app: pod-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-cleanup
  labels:
    app: pod-cleanup
subjects:
  - kind: ServiceAccount
    name: pod-cleanup
    namespace: default
roleRef:
  kind: ClusterRole
  name: pod-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-cleanup
  namespace: default
  labels:
    app: pod-cleanup
spec:
  schedule: "*/10 * * * *"
  timeZone: "${TZ}"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-cleanup
          containers:
          - name: cleanup
            image: rancher/kubectl:v1.36.2
            env:
            - name: TZ
              value: "${TZ}"
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "128Mi"
            command:
            - kubectl
            - delete
            - pods
            - -A
            - --field-selector=status.phase=Failed
            - --ignore-not-found
          restartPolicy: OnFailure
