# NOTE: (rclone -> B2)로 별도 백업
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-model
  namespace: default
  labels:
    app: immich-model
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: default
  labels:
    app: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:v3.0.3
          ports:
            - containerPort: 2283
              name: web
          env:
            - name: DB_HOSTNAME
              value: "postgres"
            - name: DB_DATABASE_NAME
              value: "immich"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DB_PASSWORD_POSTGRES
            - name: REDIS_URL
              value: "redis://redis:6379/${REDIS_DB_IMMICH}"
            - name: OAUTH_ENABLED
              value: "true"
            - name: OAUTH_ISSUER_URL
              value: "https://${SUB_POCKET_ID}.${DOMAIN_LAN}"
            - name: OAUTH_CLIENT_ID
              value: "${POCKET_ID_CLIENT_ID_IMMICH}"
            - name: OAUTH_CLIENT_SECRET
              value: "${POCKET_ID_OIDC_IMMICH}"
            - name: OAUTH_AUTO_REGISTER
              value: "true"
            - name: OAUTH_BUTTON_TEXT
              value: "Login with Pocket ID"
            - name: TZ
              value: "${TZ}"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: web
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
              subPath: immich
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: shared-media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: default
  labels:
    app: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v3.0.3
          ports:
            - containerPort: 3003
              name: web
          env:
            - name: TZ
              value: "${TZ}"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /ping
              port: web
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /ping
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: immich-model
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: default
  labels:
    app: immich-server
spec:
  selector:
    app: immich-server
  ports:
    - port: 2283
      name: web
      targetPort: 2283
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: default
  labels:
    app: immich-machine-learning
spec:
  selector:
    app: immich-machine-learning
  ports:
    - port: 3003
      name: web
      targetPort: 3003
---
# NOTE: OAuth2-Proxy 미적용 -- 자체 OIDC 인증 내장
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich
  namespace: default
  labels:
    app: immich
    auth: self
spec:
  ingressClassName: traefik
  rules:
    - host: ${SUB_IMMICH}.${DOMAIN_LAN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich-server
                port:
                  number: 2283
