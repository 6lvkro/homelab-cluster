apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
      annotations:
        backup.velero.io/backup-volumes: data
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:v0.9.2
          ports:
            - containerPort: 8080
              name: web
          envFrom:
            - configMapRef:
                name: open-webui
            - secretRef:
                name: open-webui
          env:
            - name: DATABASE_URL
              value: "postgresql://openwebui:${DB_PASSWORD_OPENWEBUI}@postgres:5432/openwebui"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: ca-cert
              mountPath: /etc/ssl/custom
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui
        - name: ca-cert
          secret:
            secretName: tls
            items:
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
spec:
  selector:
    app: open-webui
  ports:
    - port: 8080
      name: web
      targetPort: 8080
---
# NOTE: OAuth2-Proxy 미적용 -- 자체 OIDC 인증 내장
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
    auth: self
spec:
  ingressClassName: traefik
  rules:
    - host: ${SUB_OPENWEBUI}.${DOMAIN_LAN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
