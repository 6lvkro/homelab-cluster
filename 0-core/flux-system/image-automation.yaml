# Flux Image Automation -- ImageUpdateAutomation (cluster-wide)
# ImageRepository/ImagePolicy는 image-policies-{apps,platform,data}.yaml에 관리
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: homelab
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: homelab
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-image-automation
        email: flux@homelab.local
      messageTemplate: "chore(image): auto-update images"
    push:
      branch: main
  update:
    path: ./
    strategy: Setters
