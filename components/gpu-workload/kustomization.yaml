apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: Deployment
      labelSelector: "gpu"
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: unused
      spec:
        template:
          spec:
            runtimeClassName: nvidia
            nodeSelector:
              kubernetes.io/hostname: ${NODE_COMPUTE}
            tolerations:
              - key: node-role
                operator: Equal
                value: compute
                effect: NoSchedule
