apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# -- SQLite WAL checkpoint 컴포넌트
# hook command(DB 경로)는 앱마다 다르므로 각 매니페스트에서 선언한다.
patches:
  - target:
      kind: Deployment
      labelSelector: "sqlite-backup"
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: unused
      spec:
        template:
          metadata:
            annotations:
              pre.hook.backup.velero.io/timeout: "30s"
              pre.hook.backup.velero.io/on-error: Continue
          spec:
            initContainers:
              - name: install-sqlite3
                image: alpine:3.23
                command: ["/bin/sh", "-c"]
                args:
                  - apk add --no-cache sqlite && cp /usr/bin/sqlite3 /tools/
                volumeMounts:
                  - name: tools
                    mountPath: /tools
            volumes:
              - name: tools
                emptyDir:
                  sizeLimit: 10Mi
  - target:
      kind: Deployment
      labelSelector: "sqlite-backup"
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: tools
          mountPath: /tools
          readOnly: true
